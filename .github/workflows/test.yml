name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: docugen_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://testuser:testpass@localhost:5433/docugen_test
      MONDAY_SIGNING_SECRET: test-signing-secret-32-bytes-long!!
      MONDAY_CLIENT_ID: test-client-id
      MONDAY_CLIENT_SECRET: test-client-secret
      MONDAY_APP_ID: test-app-id
      REDIRECT_URI: https://test.example.com/oauth/callback
      APP_URL: https://test.example.com
      TOKEN_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NODE_ENV: test
      RESEND_API_KEY: re_test_key

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: node -e "require('./src/services/db.service').initDB().then(() => { console.log('Migrations OK'); process.exit(0); }).catch(e => { console.error(e); process.exit(1); })"

      - name: Run tests
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
